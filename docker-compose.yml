version: '3.8'

services:
  expo-app:
    build:
      context: .  # Usa Dockerfile inline (definido abaixo)
      dockerfile_inline: |  # Dockerfile embutido para simplicidade
        FROM node:22-slim
        WORKDIR /app
        COPY package*.json ./
        RUN npm install -g @expo/cli@latest
        RUN npm install
        COPY . .
        EXPOSE 8081
        CMD ["npx", "expo", "start", "--tunnel"]
    ports:
      - "8081:8081"  # Para Metro bundler
    volumes:
      - .:/app  # Monta projeto para edições ao vivo
      - /app/node_modules  # Evita conflitos com node_modules local
    environment:
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0  # Conexões externas
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    stdin_open: true  # Interativo
    tty: true         # Terminal colorido